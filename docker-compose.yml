services:
  umami-db:
    image: postgres:18.4-trixie
    restart: always
    environment:
      POSTGRES_USER: ${UMAMI_DB_USER:-umami}
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
      POSTGRES_DB: ${UMAMI_DB_NAME:-umami}
    volumes:
      - umami_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UMAMI_DB_USER:-umami} -d ${UMAMI_DB_NAME:-umami}"]
      interval: 5s
      timeout: 5s
      retries: 5

  directus_db:
    image: postgres:18.4-trixie
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-directus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-directus}
      POSTGRES_DB: ${DB_NAME:-directus}
    volumes:
      - directus_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-directus} -d ${DB_NAME:-directus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:3.1.0
    restart: always
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/${UMAMI_DB_NAME:-umami}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-replace-with-secure-random-string}
      TRACKER_SCRIPT_NAME: analytics
    depends_on:
      umami-db:
        condition: service_healthy

  directus:
    # Aktuelle Version
    image: directus/directus:11.17.4
    restart: always
    ports:
      - '8055:8055'
    volumes:
      # Volumes für persistente Daten wie Bilder und Erweiterungen (Benannte Volumes für Dokploy Backups)
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
      - directus_templates:/directus/templates
    depends_on:
      directus_db:
        condition: service_healthy
    environment:
      # Sicherheit (Muss in Dokploy als Environment Variable gesetzt werden!)
      KEY: ${KEY:-replace-with-secure-random-string}
      SECRET: ${SECRET:-replace-with-secure-random-string}

      # Datenbankverbindung
      DB_CLIENT: 'pg'
      DB_HOST: 'directus_db'
      DB_PORT: '5432'
      DB_DATABASE: ${DB_NAME:-directus}
      DB_USER: ${DB_USER:-directus}
      DB_PASSWORD: ${DB_PASSWORD:-directus}

      # Websockets für Echtzeit-Updates im CMS (optional, aber empfohlen)
      WEBSOCKETS_ENABLED: 'true'

      # Für Einladungslinks etc...
      PUBLIC_URL: ${PUBLIC_URL:-https://cms.kopfarbeit.dev}

      # MCP Auth
      MCP_OAUTH_ENABLED: ${MCP_OAUTH_ENABLED:-true}
      MCP_OAUTH_CIMD_ENABLED: ${MCP_OAUTH_CIMD_ENABLED:-true}

      # Admin User (Wird beim allerersten Start erstellt)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-d1r3ctu5}

      # Upload limit
      FILES_MAX_UPLOAD_SIZE: ${FILES_MAX_UPLOAD_SIZE:-5mb}

  # Bildoptimierung
  mazanoke:
    container_name: mazanoke
    image: ghcr.io/civilblur/mazanoke:v1.1.6
    ports:
      - '3474:80'
    restart: unless-stopped

volumes:
  directus_db_data:
  umami_db_data:
  directus_uploads:
  directus_extensions:
  directus_templates:
