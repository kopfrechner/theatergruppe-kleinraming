services:
  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: strapi
      JWT_SECRET: your-jwt-secret-change-me-32chars
      ADMIN_JWT_SECRET: your-admin-jwt-secret-change-me-x
      APP_KEYS: key1changeme,key2changeme,key3changeme,key4changeme
      API_TOKEN_SALT: your-api-token-salt-change-me-x
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: development
    ports:
      - "1337:1337"
    volumes:
      - ./strapi/src:/opt/app/src
      - ./strapi/config:/opt/app/config
      - ./strapi/public:/opt/app/public
      - ./strapi/database:/opt/app/database
      - ./strapi/package.json:/opt/app/package.json
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
    volumes:
      - strapi_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

volumes:
  strapi_db:
