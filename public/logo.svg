<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150">
  <defs>
    <!-- Comedy mask: light half gradient -->
    <linearGradient id="cl" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0%" stop-color="#f8faf2"/>
      <stop offset="50%" stop-color="#eaefdc"/>
      <stop offset="100%" stop-color="#d2daba"/>
    </linearGradient>
    <!-- Comedy mask: green half gradient -->
    <linearGradient id="cg" x1="0.7" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#b8e858"/>
      <stop offset="45%" stop-color="#8FC238"/>
      <stop offset="100%" stop-color="#6a9a20"/>
    </linearGradient>
    <!-- Comedy mask: glossy highlight -->
    <radialGradient id="ch" cx="0.35" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Tragedy mask: dark gradient -->
    <linearGradient id="tg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="40%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <!-- Tragedy mask: highlight gloss -->
    <radialGradient id="th" cx="0.42" cy="0.2" r="0.48">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="ds" x="-8%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <!-- Clip halves for comedy mask split -->
    <clipPath id="lh"><rect x="0" y="0" width="75" height="200"/></clipPath>
    <clipPath id="rh"><rect x="75" y="0" width="200" height="200"/></clipPath>
    <!-- Comedy mask reusable shape (face-like, smooth dome top, rounded chin) -->
    <path id="cm" d="
      M 42,25
      C 38,8  58,0  75,0
      C 92,0  112,8 108,25
      C 114,42 112,56 106,67
      C 99,80  90,92 82,97
      C 78,101 72,101 68,97
      C 60,92  51,80 44,67
      C 38,56  36,42 42,25 Z"/>
  </defs>

  <!-- Soft ground shadow -->
  <ellipse cx="118" cy="140" rx="58" ry="5" fill="rgba(0,0,0,0.06)"/>

  <!-- ============ TRAGEDY MASK (behind, right) ============ -->
  <g filter="url(#ds)" transform="rotate(3, 158, 55)">
    <!-- Base shape -->
    <path d="
      M 128,28
      C 123,10  143,1  158,1
      C 173,1   193,10 188,28
      C 196,46  194,60 188,70
      C 181,84  172,96 164,101
      C 161,104 155,104 152,101
      C 144,96  135,84 128,70
      C 122,60  120,46 128,28 Z"
      fill="url(#tg)" stroke="rgba(100,100,100,0.25)" stroke-width="0.7"/>
    <!-- Glossy highlight overlay -->
    <path d="
      M 128,28
      C 123,10  143,1  158,1
      C 173,1   193,10 188,28
      C 196,46  194,60 188,70
      C 181,84  172,96 164,101
      C 161,104 155,104 152,101
      C 144,96  135,84 128,70
      C 122,60  120,46 128,28 Z"
      fill="url(#th)"/>

    <!-- Sad eyebrows (drooping inward) -->
    <path d="M 139,38 Q 145,33 152,37" stroke="rgba(220,220,220,0.55)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 177,37 Q 171,33 164,38" stroke="rgba(220,220,220,0.55)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Sad eyes (almond-shaped, tilted inward) -->
    <ellipse cx="146" cy="47" rx="7.5" ry="4.5" fill="#d8d8d8" transform="rotate(10,146,47)"/>
    <ellipse cx="170" cy="47" rx="7.5" ry="4.5" fill="#d8d8d8" transform="rotate(-10,170,47)"/>
    <!-- Eye inner shadow -->
    <ellipse cx="146" cy="48" rx="5" ry="2.5" fill="rgba(0,0,0,0.08)" transform="rotate(10,146,48)"/>
    <ellipse cx="170" cy="48" rx="5" ry="2.5" fill="rgba(0,0,0,0.08)" transform="rotate(-10,170,48)"/>

    <!-- Nose -->
    <path d="M 157,54 Q 159,63 161,62 Q 157,64 155,61" stroke="rgba(180,180,180,0.3)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Nasolabial folds -->
    <path d="M 151,58 Q 147,70 143,78" stroke="rgba(180,180,180,0.12)" stroke-width="0.8" fill="none"/>
    <path d="M 165,58 Q 169,70 173,78" stroke="rgba(180,180,180,0.12)" stroke-width="0.8" fill="none"/>

    <!-- Frown (thicker, more expressive) -->
    <path d="M 142,83 Q 158,70 174,83" stroke="#d8d8d8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Frown inner shadow/lip line -->
    <path d="M 146,82 Q 158,73 170,82" stroke="rgba(0,0,0,0.08)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ============ COMEDY MASK (in front, left) ============ -->
  <g filter="url(#ds)" transform="rotate(-3, 75, 55)">
    <!-- Left half (cream/white) -->
    <use href="#cm" fill="url(#cl)" clip-path="url(#lh)"/>
    <!-- Right half (green) -->
    <use href="#cm" fill="url(#cg)" clip-path="url(#rh)"/>
    <!-- Glossy highlight overlay -->
    <use href="#cm" fill="url(#ch)"/>
    <!-- Subtle edge stroke -->
    <use href="#cm" fill="none" stroke="rgba(120,170,40,0.3)" stroke-width="0.7"/>
    <!-- Center divider line (very subtle) -->
    <line x1="75" y1="2" x2="75" y2="99" stroke="rgba(80,130,20,0.15)" stroke-width="0.5"/>

    <!-- Raised eyebrows -->
    <path d="M 52,30 Q 58,23 65,28" stroke="rgba(45,90,15,0.65)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 98,28 Q 92,23 85,30" stroke="rgba(45,90,15,0.65)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Happy eyes (almond-shaped) -->
    <ellipse cx="58" cy="40" rx="6.5" ry="4.2" fill="#2d5a0f" transform="rotate(-5,58,40)"/>
    <ellipse cx="92" cy="40" rx="6.5" ry="4.2" fill="#2d5a0f" transform="rotate(5,92,40)"/>
    <!-- Eye highlights (catchlights) -->
    <ellipse cx="60" cy="39" rx="2.2" ry="1.6" fill="rgba(255,255,255,0.45)" transform="rotate(-5,60,39)"/>
    <ellipse cx="94" cy="39" rx="2.2" ry="1.6" fill="rgba(255,255,255,0.45)" transform="rotate(5,94,39)"/>

    <!-- Nose -->
    <path d="M 73,46 Q 75,56 77,55 Q 73,57 71,54" stroke="rgba(45,90,15,0.3)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Dimple/cheek lines -->
    <path d="M 53,62 Q 51,55 54,48" stroke="rgba(45,90,15,0.15)" stroke-width="0.8" fill="none"/>
    <path d="M 97,62 Q 99,55 96,48" stroke="rgba(45,90,15,0.15)" stroke-width="0.8" fill="none"/>

    <!-- Big smile (thick, expressive) -->
    <path d="M 52,68 Q 75,92 98,68" stroke="#2d5a0f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Teeth/highlight inside smile -->
    <path d="M 58,72 Q 75,84 92,72" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Lip line -->
    <path d="M 56,70 Q 75,88 94,70" stroke="rgba(45,90,15,0.12)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
